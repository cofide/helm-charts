name: publish-helm-chart
on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: 'latest'
      - name: Package Helm chart
        run: |
          helm package charts/cofide-agent --destination packaged
          helm package charts/cofide-connect --destination packaged
      - name: Deploy Helm charts to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packaged --project-name=YOUR_CLOUDFLARE_PAGES_PROJECT_NAME
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

