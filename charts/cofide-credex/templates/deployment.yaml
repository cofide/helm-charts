{{- if .Values.credex.preflightChecks }}
{{- if not (lookup "v1" "Secret" .Release.Namespace .Values.credex.oauthPrivateKeySecret) }}
{{- fail (printf "Required Secret '%s' not found in namespace '%s'. Create it with the OAuth AS private key before installing cofide-credex." .Values.credex.oauthPrivateKeySecret .Release.Namespace) }}
{{- end }}
{{- if .Values.credex.tls.enabled }}
{{- if not (lookup "v1" "Secret" .Release.Namespace .Values.credex.tls.secretName) }}
{{- fail (printf "TLS Secret '%s' not found in namespace '%s'. Create it with 'tls.crt' and 'tls.key' before installing cofide-credex." .Values.credex.tls.secretName .Release.Namespace) }}
{{- end }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cofide-credex.fullname" . }}
  labels:
    {{- include "cofide-credex.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cofide-credex.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cofide-credex.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cofide-credex.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ include "cofide-credex.targetPort" . | int }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cofide-credex.fullname" . }}
          {{- with .Values.credex.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- $livenessProbe := . | deepCopy -}}
            {{- if $livenessProbe.httpGet }}
            {{- $_ := set $livenessProbe.httpGet "port" (include "cofide-credex.livenessProbePort" $ | int) -}}
            {{- $_ := set $livenessProbe.httpGet "scheme" (include "cofide-credex.probeScheme" $) -}}
            {{- end }}
            {{- toYaml $livenessProbe | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- $readinessProbe := . | deepCopy -}}
            {{- if $readinessProbe.httpGet }}
            {{- $_ := set $readinessProbe.httpGet "port" (include "cofide-credex.readinessProbePort" $ | int) -}}
            {{- $_ := set $readinessProbe.httpGet "scheme" (include "cofide-credex.probeScheme" $) -}}
            {{- end }}
            {{- toYaml $readinessProbe | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: oauth-private-key
              mountPath: /run/credex/keys
              readOnly: true
            {{- if .Values.credex.tls.enabled }}
            - name: tls-certs
              mountPath: {{ .Values.credex.tls.certFile }}
              subPath: tls.crt
              readOnly: true
            - name: tls-certs
              mountPath: {{ .Values.credex.tls.keyFile }}
              subPath: tls.key
              readOnly: true
            {{- end }}
            {{- if .Values.volumeMounts }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}
            {{- with .Values.credex.extraCA }}
            - name: extra-ca
              mountPath: /etc/ssl/certs/extra-ca.crt
              subPath: ca.crt
              readOnly: true
            {{- end }}
            {{- with $.Values.credex.spireAgentAdminSocketHostPath }}
            - name: spire-agent-admin-socket-dir
              mountPath: {{ $.Values.credex.spireAgentAdminSocket | trimPrefix "unix://" | dir }}
              readOnly: true
            {{- end }}
      volumes:
        - name: oauth-private-key
          secret:
            secretName: {{ .Values.credex.oauthPrivateKeySecret }}
        {{- if .Values.credex.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.credex.tls.secretName }}
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        {{- end }}
        {{- if .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}
        {{- with .Values.credex.extraCA }}
        - name: extra-ca
          configMap:
            name: {{ include "cofide-credex.fullname" $ }}-extra-ca
        {{- end }}
        {{- with .Values.credex.spireAgentAdminSocketHostPath }}
        - name: spire-agent-admin-socket-dir
          hostPath:
            path: {{ . }}
            type: DirectoryOrCreate
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
